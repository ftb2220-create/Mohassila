<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الصفحة غير موجودة | محصّلة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
        background: #0A0F1E;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .container { padding: 2rem; }
      .code {
        font-size: 8rem;
        font-weight: 700;
        background: linear-gradient(135deg, #06B6D4, #0891B2);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 { font-size: 1.8rem; color: #E2E8F0; margin-bottom: 0.75rem; }
      p { color: #64748B; margin-bottom: 2rem; font-size: 1rem; }
      a {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: linear-gradient(135deg, #06B6D4, #0891B2);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      a:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>الصفحة غير موجودة</h1>
      <p>الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
      <a href="/login">العودة للرئيسية</a>
    </div>
  </body>
</html>
